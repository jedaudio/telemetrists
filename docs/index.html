<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELEMETRISTS | Signal Recovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-text: #E4D9CE;
            --bg-black: #0F0F0F; 
            --accent: #A6632A;  
            --glitch-red: rgba(255, 40, 40, 0.35);
            --glitch-blue: rgba(40, 255, 255, 0.25);
        }

        body {
            background-color: var(--bg-black);
            color: var(--primary-text);
            font-family: 'Oswald', sans-serif;
            margin: 0;
            padding: 0;
            font-weight: 200; 
            overflow-x: hidden;
            position: relative;
        }

        /* --- SCANLINE OVERLAY --- */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.12) 50%
            ), linear-gradient(
                90deg, 
                rgba(255, 0, 0, 0.01), 
                rgba(0, 255, 0, 0.005), 
                rgba(0, 0, 255, 0.01)
            );
            z-index: 100;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        header {
            position: fixed; 
            top: 0; width: 100%;
            z-index: 10;
            padding: 15px 30px;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(228, 217, 206, 0.1);
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .contact-link { color: var(--primary-text); text-decoration: none; transition: color 0.3s ease; }
        .contact-link:hover { color: var(--accent); }

        .hero-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            z-index: -1;
        }

        .hero-image {
            width: 100%; height: 100%;
            background: url('./home-image.png') no-repeat center center;
            background-size: cover;
            filter: contrast(1.05) brightness(0.85);
        }

        .content {
            position: relative;
            margin-top: 70vh; /* Default desktop start */
            padding: 60px 40px 100px 40px; 
            text-align: center;
            z-index: 2;
            /* Smooths the 'snap' if the window/orientation changes */
            transition: margin-top 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: linear-gradient(to bottom, 
                rgba(15, 15, 15, 0) 0%, 
                rgba(15, 15, 15, 0.6) 10%, 
                rgba(15, 15, 15, 0.95) 30%, 
                rgba(15, 15, 15, 1) 100%);
        }

        /* --- TITLE: CHROMATIC ABERRATION & STATIC FLICKER --- */
        h1 {
            font-weight: 200;
            font-size: 3.5rem;
            letter-spacing: 18px;
            margin: 0;
            color: rgba(228, 217, 206, 0.85); 
            text-transform: uppercase;
            position: relative;
            text-shadow: 
                1.5px 0 var(--glitch-red), 
                -1.5px 0 var(--glitch-blue),
                0px 0px 8px rgba(0,0,0,0.5);
            animation: electricalPulse 6s infinite;
        }

        @keyframes electricalPulse {
            0%, 100% { opacity: 0.9; }
            48% { opacity: 0.9; }
            50% { opacity: 1; }
            52% { opacity: 0.9; }
            54% { opacity: 0.95; }
            56% { opacity: 0.9; }
        }

        .social-relay {
            margin-top: 25px;
            margin-bottom: 45px;
            display: flex;
            justify-content: center;
            gap: 35px;
        }

        .social-relay svg {
            fill: var(--primary-text);
            width: 22px; height: 22px;
            transition: all 0.3s ease;
            opacity: 0.5;
        }

        .social-relay a:hover svg { fill: var(--accent); opacity: 1; transform: scale(1.1); }

        .manifesto-box {
            padding: 30px 0;
            border-top: 1px solid rgba(228, 217, 206, 0.1);
        }

        .title-bracket {
            font-size: 0.8rem;
            color: var(--accent);
            letter-spacing: 5px;
            margin-bottom: 15px;
            display: block;
        }

        .manifesto-box p {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 0;
            opacity: 0.8;
        }

        .internal-footer {
            margin-top: 60px; 
            padding-top: 30px;
            border-top: 1px solid rgba(228, 217, 206, 0.05);
            font-size: 0.6rem;
            letter-spacing: 3px;
            opacity: 0.3;
            text-transform: uppercase;
        }

        /* --- REFINED MOBILE OPTIMIZATION --- */
        @media (max-width: 768px) {
            header {
                padding: 12px 20px;
                font-size: 0.6rem;
                letter-spacing: 2px;
            }

            .content {
                /* Content starts much lower to keep home-image.png visible */
                margin-top: 78vh; 
                padding: 40px 20px 80px 20px;
            }

            h1 {
                font-size: 1.6rem; /* Slightly smaller to prevent line-wrapping */
                letter-spacing: 6px;
            }

            .social-relay {
                gap: 20px; /* Tighter grouping */
                margin-bottom: 30px;
            }

            .social-relay svg {
                width: 18px;
                height: 18px;
            }

            .manifesto-box p {
                font-size: 0.7rem;
                letter-spacing: 2px;
                line-height: 1.8;
            }
        }
    </style>
</head>
