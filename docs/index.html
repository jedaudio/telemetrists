<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELEMETRISTS | Signal Recovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-text: #E4D9CE;
            --bg-black: #0F0F0F; 
            --accent: #A6632A;  
            --glitch-red: rgba(255, 40, 40, 0.35);
            --glitch-blue: rgba(40, 255, 255, 0.25);
            --header-h: 120px; /* Increased height to allow for a longer gradient throw */
        }

        body {
            background-color: var(--bg-black);
            color: var(--primary-text);
            font-family: 'Oswald', sans-serif;
            margin: 0; padding: 0;
            font-weight: 200; 
            overflow-x: hidden;
            width: 100%;
        }

        /* --- GLOBAL FRICTION LAYER --- */
        .friction-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: url('./Copper Canvas.jpg') no-repeat center center;
            background-size: cover;
            z-index: 90; 
            pointer-events: none; 
            opacity: 0.20; 
            mix-blend-mode: multiply;
        }

        /* --- CINEMATIC VIGNETTE --- */
        .page-vignette {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, 
                rgba(15, 15, 15, 0) 0%, 
                rgba(15, 15, 15, 0.2) 60%, 
                rgba(166, 99, 42, 0.3) 100%);
            z-index: 85;
            pointer-events: none;
        }

        /* --- CRT/SCANLINE OVERLAY --- */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.12) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.005), rgba(0, 0, 255, 0.01));
            z-index: 100;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        /* --- GRADIENT HEADER (MIRRORS FOOTER LOGIC) --- */
        header {
            position: fixed; 
            top: 0; left: 0;
            width: 100%;
            height: var(--header-h);
            z-index: 95;
            padding: 0 30px;
            /* Matches footer transparency logic: Solid-ish at top, fades to 0 at bottom */
            background: linear-gradient(to bottom, 
                rgba(15, 15, 15, 0.85) 0%, 
                rgba(15, 15, 15, 0.8) 40%, 
                rgba(15, 15, 15, 0) 100%);
            display: flex;
            justify-content: space-between;
            align-items: flex-start; /* Align items to top since header is taller */
            padding-top: 25px; 
            box-sizing: border-box;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        #menu-toggle { display: none; }
        
        .hamburger {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 95;
            padding: 5px 0;
            margin-left: 20px;
        }

        .hamburger span {
            display: block;
            width: 20px;
            height: 1px;
            background: var(--primary-text);
            transition: 0.3s;
        }

        #menu-toggle:checked ~ header .hamburger span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        #menu-toggle:checked ~ header .hamburger span:nth-child(2) { opacity: 0; }
        #menu-toggle:checked ~ header .hamburger span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .social-tray {
            display: flex;
            align-items: center;
            gap: 20px;
            opacity: 0;
            transform: translateX(10px);
            transition: all 0.4s ease;
            pointer-events: none;
        }

        #menu-toggle:checked ~ header .social-tray {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .social-tray svg {
            fill: var(--primary-text);
            width: 18px; height: 18px;
            opacity: 0.6;
            transition: 0.3s;
        }

        .social-tray a:hover svg { fill: var(--accent); opacity: 1; transform: scale(1.1); }

        .nav-right-wrapper {
            display: flex;
            align-items: center;
        }

        .hero-container { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: -1; }
        .hero-image { 
            width: 100%; 
            height: 100%; 
            background: url('./home-image.png') no-repeat center center;
            background-size: cover; 
            filter: brightness(0.8); 
        }

        .content {
            position: relative;
            margin-top: 75vh;
            padding: 100px 20px; 
            text-align: center;
            z-index: 2;
            background: linear-gradient(to bottom, 
                rgba(15, 15, 15, 0) 0%, 
                rgba(15, 15, 15, 0.8) 15%, 
                rgba(15, 15, 15, 0.85) 40%);
        }

        h1 { font-weight: 200; font-size: 3.5rem; letter-spacing: 18px; margin: 0; text-shadow: 1.5px 0 var(--glitch-red), -1.5px 0 var(--glitch-blue); animation: electricalPulse 6s infinite; }

        @keyframes electricalPulse { 0%, 100%, 48%, 52%, 56% { opacity: 0.9; } 50% { opacity: 1; } 54% { opacity: 0.95; } }

        .manifesto-box { padding: 40px 0; border-top: 1px solid rgba(228, 217, 206, 0.1); max-width: 600px; margin: 0 auto; }
        .title-bracket { font-size: 0.7rem; color: var(--accent); letter-spacing: 6px; margin-bottom: 20px; display: block; }

        .internal-footer { margin-top: 80px; font-size: 0.55rem; letter-spacing: 3px; opacity: 0.2; }

        @media (max-width: 768px) {
            :root { --header-h: 100px; }
            header { padding: 20px 15px 0 15px; }
            h1 { font-size: 1.6rem; letter-spacing: 6px; }
            .content { margin-top: 65vh; }
        }
    </style>
</head>
